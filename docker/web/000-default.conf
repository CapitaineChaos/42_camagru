# Déclarer un site qui ecoute sur 80
<VirtualHost *:80>

    # Le répertoire racine du site est public
    DocumentRoot /var/www/html/public

    # Début des regles appliquées au répertoire public
    <Directory /var/www/html/public>
        # Interdit de lister un dossier, autorise les liens symboliques
        Options -Indexes +FollowSymLinks

        # Désactive les directives .htaccess
        AllowOverride None

        # Autorise l'accès à tout le dossier
        Require all granted

        # Front controller : Activer la réécriture d'URL pour rediriger les requêtes
        RewriteEngine On
        # Si l'URL ne correspond pas à un fichier
        RewriteCond %{REQUEST_FILENAME} !-f
        # ou à un dossier
        RewriteCond %{REQUEST_FILENAME} !-d
        # alors redirige vers index.php
        RewriteRule ^ index.php [QSA,L]
    </Directory>

    # Erreurs Apache
    ErrorLog ${APACHE_LOG_DIR}/error.log
    # Erreurs access HTTP
    CustomLog ${APACHE_LOG_DIR}/access.log combined
</VirtualHost>
