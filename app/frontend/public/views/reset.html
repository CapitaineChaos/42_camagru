<section class="auth-form">
    <h2>Nouveau mot de passe</h2>
    <form id="reset-form">
        <label for="reset-password">Nouveau mot de passe</label>
        <input id="reset-password" name="password" type="password" required autocomplete="new-password">

        <label for="reset-password2">Confirmer</label>
        <input id="reset-password2" name="password2" type="password" required autocomplete="new-password">

        <button type="submit">Enregistrer</button>
    </form>
    <p class="form-error"  id="reset-error"></p>
    <p class="form-success" id="reset-success"></p>
</section>
