<section class="auth-form">
    <h2>Sign Up</h2>
    <form id="register-form">
        <div class="form-group">
            <label for="reg-username">Username</label>
            <input minlength="3" id="reg-username" name="username" type="text" required autocomplete="username">
        </div>
        <div class="form-group">
            <label for="reg-email">Email</label>
            <input id="reg-email" name="email" type="email" required autocomplete="email">
        </div>
        <div class="form-group">
            <label for="reg-password">Password</label>
            <input minlength="8" id="reg-password" name="password" type="password" required autocomplete="new-password">
        </div>
        <div class="form-group">
            <label for="reg-password2">Confirm password</label>
            <input minlength="8" id="reg-password2" name="password2" type="password" required autocomplete="new-password">
        </div>
        <button type="submit" class="btn btn--primary">Sign Up</button>
    </form>
    <p class="form-error" id="register-error"></p>
    <p>Already have an account? <a href="#/login">Sign In</a></p>
</section>
